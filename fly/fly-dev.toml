# Fly.io deployment configuration for the Distillery MCP staging app.
#
# Singleton staging app used to test branches from norrietaylor/distillery.
# Lifecycle is driven by PR comments via the staging-deploy / staging-teardown
# workflows in this repo.
#
# The mounted volume (distillery_staging_data) is created fresh on every
# deploy as a fork of the prod `distillery_data` volume, and destroyed on
# teardown. See .github/workflows/staging-deploy.yml.

app = "distillery-mcp-dev"

[build]
  dockerfile = "Dockerfile-dev"

[env]
  DISTILLERY_CONFIG = "/app/distillery-staging.yaml"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/.well-known/oauth-authorization-server"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "distillery_staging_data"
  destination = "/data"
