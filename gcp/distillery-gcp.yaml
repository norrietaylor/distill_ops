# Cloud Run Distillery configuration — local DuckDB on GCS FUSE volume, GitHub OAuth.
#
# The database file lives on a GCS FUSE-mounted volume at /data so it persists
# across Cloud Run revisions and scale-to-zero cold starts.
#
# Secrets (set via `gcloud secrets create` and referenced in service.yaml):
#   JINA_API_KEY          — Jina embedding API key
#   GITHUB_CLIENT_ID      — GitHub OAuth app client ID
#   GITHUB_CLIENT_SECRET  — GitHub OAuth app client secret
#   DISTILLERY_WEBHOOK_SECRET — Webhook authorization secret
#   DISTILLERY_BASE_URL   — Public server URL for OAuth callbacks (e.g. https://<service>.run.app)

storage:
  backend: duckdb
  database_path: /data/distillery.db

embedding:
  provider: jina
  model: jina-embeddings-v3
  dimensions: 1024
  api_key_env: JINA_API_KEY

team:
  name: ""

rate_limit:
  embedding_budget_daily: 500
  max_db_size_mb: 900
  warn_db_size_pct: 80

server:
  auth:
    provider: github
    client_id_env: GITHUB_CLIENT_ID
    client_secret_env: GITHUB_CLIENT_SECRET
    # Restrict access to GitHub org members (optional).
    # Users must be a member of at least one listed org to access the server.
    # Also configurable via DISTILLERY_ALLOWED_ORGS=my-org,other-org env var
    # (env values are merged with YAML values).
    # For private org support, set the GITHUB_ORG_CHECK_TOKEN secret to a PAT
    # with read:org scope: `gcloud secrets create github-org-check-token --data-file=-`
    # allowed_orgs:
    #   - my-company
    # membership_cache_ttl_seconds: 3600  # default: 1 hour
  webhooks:
    enabled: true
    secret_env: DISTILLERY_WEBHOOK_SECRET
