# Cloud Run service manifest for Distillery
#
# This manifest defines the Cloud Run service with:
# - GCS FUSE volume mount for persistent DuckDB storage
# - Workload Identity service account (distillery-run)
# - Secret Manager references for sensitive values
# - Appropriate resource limits and health probes
#
# To deploy:
#   gcloud run services replace gcp/service.yaml --region=us-central1
#
# Before deploying, ensure:
# 1. bootstrap.sh has been run to create service accounts, bucket, etc.
# 2. Secret Manager secrets have been created:
#    gcloud secrets create JINA_API_KEY --data-file=-
#    gcloud secrets create GITHUB_CLIENT_ID --data-file=-
#    gcloud secrets create GITHUB_CLIENT_SECRET --data-file=-
#    gcloud secrets create DISTILLERY_WEBHOOK_SECRET --data-file=-
#    gcloud secrets create DISTILLERY_BASE_URL --data-file=-

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: distillery
  # Cloud Run (fully managed) requires the namespace to be the project ID
  # (or number) — `gcloud run services replace` rejects anything else.
  # PROJECT_ID is substituted by the deploy workflow, same as elsewhere.
  namespace: PROJECT_ID
spec:
  template:
    metadata:
      annotations:
        # Single-writer constraint: max=1 prevents concurrent DuckDB writers
        # on the GCS FUSE volume. Do NOT raise this — DuckDB assumes a single
        # process owns the .db file and its WAL. See spec Non-Goals and
        # Technical Considerations sections for background.
        run.googleapis.com/max-instances: '1'
        # Scale-to-zero: no idle charges, cold-start tolerated via startup probe.
        run.googleapis.com/min-instances: '0'
        # Keep CPU unthrottled so GCS FUSE mount + app init finish before the
        # startup probe hits its failureThreshold on a cold revision.
        run.googleapis.com/cpu-throttling: 'false'
        # Cloud Run second-generation execution environment (required for GCS FUSE).
        # Must be an annotation in Knative v1 manifests — executionEnvironment is not
        # a valid spec field.
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: distillery-run
      timeoutSeconds: 300
      containerConcurrency: 10

      containers:
      - name: distillery
        # Image will be substituted by the deploy workflow:
        # <region>-docker.pkg.dev/<project>/distillery/distillery:<tag>
        image: us-central1-docker.pkg.dev/PROJECT_ID/distillery/distillery:latest

        ports:
        - containerPort: 8000
          protocol: TCP

        # Environment variables and Secret Manager references
        env:
        - name: DISTILLERY_BASE_URL
          valueFrom:
            secretKeyRef:
              name: DISTILLERY_BASE_URL
              key: latest
        - name: JINA_API_KEY
          valueFrom:
            secretKeyRef:
              name: JINA_API_KEY
              key: latest
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: GITHUB_CLIENT_ID
              key: latest
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: GITHUB_CLIENT_SECRET
              key: latest
        - name: DISTILLERY_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: DISTILLERY_WEBHOOK_SECRET
              key: latest
        # Pre-shared machine token for non-interactive MCP clients (CI /
        # gh-aw agentic workflows) that cannot run the browser OAuth flow.
        # See distillery's _MachineTokenGitHubProvider. The identity is the
        # login attributed to the token's calls for authorship and audit.
        - name: DISTILLERY_MCP_MACHINE_TOKEN
          valueFrom:
            secretKeyRef:
              name: DISTILLERY_MCP_MACHINE_TOKEN
              key: latest
        - name: DISTILLERY_MCP_MACHINE_IDENTITY
          value: spectacles
        # Gate interactive GitHub OAuth to members of this org. Machine-token
        # clients (DISTILLERY_MCP_MACHINE_TOKEN) bypass this gate by design.
        # If gominimal membership is private, also set a GITHUB_ORG_CHECK_TOKEN
        # secret (a read:org PAT) so distillery can resolve membership.
        - name: DISTILLERY_ALLOWED_ORGS
          value: gominimal

        # Resource limits: 2 vCPU with 1 GiB RAM
        resources:
          limits:
            cpu: "2"
            memory: 1024Mi

        # Health check: probe OAuth discovery endpoint
        startupProbe:
          httpGet:
            path: /.well-known/oauth-authorization-server
            port: 8000
          initialDelaySeconds: 5
          timeoutSeconds: 4   # must be < periodSeconds (Cloud Run constraint)
          periodSeconds: 5
          failureThreshold: 6  # ~30 seconds tolerance for cold start + GCS FUSE mount

        # Liveness probe: lightweight check
        livenessProbe:
          httpGet:
            path: /.well-known/oauth-authorization-server
            port: 8000
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        # Volume mount: GCS FUSE
        volumeMounts:
        - name: data
          mountPath: /data

      # GCS FUSE volume: mounted as read-write, backed by the data bucket
      volumes:
      - name: data
        csi:
          driver: gcsfuse.run.googleapis.com
          readOnly: false
          volumeAttributes:
            bucketName: "PROJECT_ID-distillery-data"
            # File system options: allow_unauthenticated_cmek is false by default
            # and implicit_dirs is false (we do not need directory listing optimization).
            # Metadata cache and data cache are enabled by default.

  # Scale-to-zero: minInstances=0 means the service shuts down when idle;
  # maxInstances=1 prevents write contention on the DuckDB file via GCS FUSE.
  traffic:
  - percent: 100
    latestRevision: true
