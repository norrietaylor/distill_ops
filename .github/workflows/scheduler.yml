          exit 1
      - name: Trigger maintenance webhook (${{ matrix.target }})
        if: ${{ matrix.enabled && matrix.url != '' }}
        env:
          DISTILLERY_WEBHOOK_SECRET: ${{ secrets.DISTILLERY_WEBHOOK_SECRET }}
          TARGET_URL: ${{ matrix.url }}
          TARGET: ${{ matrix.target }}
        run: |
          http_code=$(curl -sS -o /tmp/response.json -w '%{http_code}' \
