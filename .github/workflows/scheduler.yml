name: Distillery Scheduler

on:
  schedule:
    - cron: "23 * * * *"  # Hourly poll (at minute 23)
    - cron: "17 6 * * *"  # Daily rescore (06:17 UTC)
    - cron: "41 7 * * 1"  # Weekly maintenance (07:41 UTC Monday)
  workflow_dispatch:
    inputs:
      operation:
        description: "Operation to run"
        required: true
        default: "all"
        type: choice
        options:
          - poll
          - rescore
          - maintenance
          - all

jobs:
  poll:
    name: Poll Feed Sources (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.operation == 'poll' || github.event.inputs.operation == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '23 * * * *'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fly
            url: ${{ vars.DISTILLERY_URL }}
            enabled: true
          - target: gcp
            url: ${{ vars.DISTILLERY_GCP_URL }}
            enabled: ${{ vars.DISTILLERY_GCP_URL != '' }}
    steps:
      - name: Skip if target disabled
        if: ${{ !matrix.enabled || matrix.url == '' }}
        run: |
          echo "Target ${{ matrix.target }} is not configured — skipping"
      - name: Warm ${{ matrix.target }} instance
        if: ${{ matrix.enabled && matrix.url != '' }}
        env:
          TARGET_URL: ${{ matrix.url }}
        run: |
          # Wake the suspended instance with a cheap GET and wait until
          # the app is actually ready before issuing the webhook POST.
          deadline=$((SECONDS + 300))
          attempt=0
          until [ "$SECONDS" -ge "$deadline" ]; do
            attempt=$((attempt + 1))
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 \
              "${TARGET_URL}/.well-known/oauth-authorization-server" || echo "000")
            if [ "$code" = "200" ]; then
              echo "App ready after ${attempt} attempt(s) (${SECONDS}s)"
              exit 0
            fi
            echo "Attempt ${attempt}: HTTP ${code} — waiting for app..."
            sleep 10
          done
          echo "::error::App did not become ready within 300s"
          exit 1
      - name: Trigger poll webhook (${{ matrix.target }})
        if: ${{ matrix.enabled && matrix.url != '' }}
        env:
          DISTILLERY_WEBHOOK_SECRET: ${{ secrets.DISTILLERY_WEBHOOK_SECRET }}
          TARGET_URL: ${{ matrix.url }}
          TARGET: ${{ matrix.target }}
        run: |
          http_code=$(curl -sS -o /tmp/response.json -w '%{http_code}' \
            --max-time 600 \
            --retry 3 --retry-delay 15 --retry-all-errors \
            -X POST \
            -H "Authorization: Bearer ${DISTILLERY_WEBHOOK_SECRET}" \
            "${TARGET_URL}/api/poll")
          cat /tmp/response.json >> "${GITHUB_STEP_SUMMARY}"
          if [ "$http_code" = "429" ]; then
            echo "::warning::${TARGET} endpoint in cooldown (429) — skipping"
            echo "${TARGET}: cooldown (429)" >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          elif [ "$http_code" -ge 400 ]; then
            echo "::error::${TARGET} webhook returned HTTP ${http_code}"
            echo "${TARGET}: failed (HTTP ${http_code})" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
          echo "${TARGET}: ok" >> "${GITHUB_STEP_SUMMARY}"

  rescore:
    name: Rescore Feed Entries (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.operation == 'rescore' || github.event.inputs.operation == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '17 6 * * *'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fly
            url: ${{ vars.DISTILLERY_URL }}
            enabled: true
          - target: gcp
            url: ${{ vars.DISTILLERY_GCP_URL }}
            enabled: ${{ vars.DISTILLERY_GCP_URL != '' }}
    steps:
      - name: Skip if target disabled
        if: ${{ !matrix.enabled || matrix.url == '' }}
        run: |
          echo "Target ${{ matrix.target }} is not configured — skipping"
      - name: Warm ${{ matrix.target }} instance
        if: ${{ matrix.enabled && matrix.url != '' }}
        env:
          TARGET_URL: ${{ matrix.url }}
        run: |
          deadline=$((SECONDS + 300))
          attempt=0
          until [ "$SECONDS" -ge "$deadline" ]; do
            attempt=$((attempt + 1))
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 \
              "${TARGET_URL}/.well-known/oauth-authorization-server" || echo "000")
            if [ "$code" = "200" ]; then
              echo "App ready after ${attempt} attempt(s) (${SECONDS}s)"
              exit 0
            fi
            echo "Attempt ${attempt}: HTTP ${code} — waiting for app..."
            sleep 10
          done
          echo "::error::App did not become ready within 300s"
          exit 1
      - name: Trigger rescore webhook (${{ matrix.target }})
        if: ${{ matrix.enabled && matrix.url != '' }}
        env:
          DISTILLERY_WEBHOOK_SECRET: ${{ secrets.DISTILLERY_WEBHOOK_SECRET }}
          TARGET_URL: ${{ matrix.url }}
          TARGET: ${{ matrix.target }}
        run: |
          http_code=$(curl -sS -o /tmp/response.json -w '%{http_code}' \
            --max-time 600 \
            --retry 3 --retry-delay 15 --retry-all-errors \
            -X POST \
            -H "Authorization: Bearer ${DISTILLERY_WEBHOOK_SECRET}" \
            "${TARGET_URL}/api/rescore")
          cat /tmp/response.json >> "${GITHUB_STEP_SUMMARY}"
          if [ "$http_code" = "429" ]; then
            echo "::warning::${TARGET} endpoint in cooldown (429) — skipping"
            echo "${TARGET}: cooldown (429)" >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          elif [ "$http_code" -ge 400 ]; then
            echo "::error::${TARGET} webhook returned HTTP ${http_code}"
            echo "${TARGET}: failed (HTTP ${http_code})" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
          echo "${TARGET}: ok" >> "${GITHUB_STEP_SUMMARY}"

  maintenance:
    name: Weekly KB Maintenance (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.operation == 'maintenance' || github.event.inputs.operation == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '41 7 * * 1'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fly
            url: ${{ vars.DISTILLERY_URL }}
            enabled: true
          - target: gcp
            url: ${{ vars.DISTILLERY_GCP_URL }}
            enabled: ${{ vars.DISTILLERY_GCP_URL != '' }}
    steps:
      - name: Skip if target disabled
        if: ${{ !matrix.enabled || matrix.url == '' }}
        run: |
          echo "Target ${{ matrix.target }} is not configured — skipping"
      - name: Warm ${{ matrix.target }} instance
        if: ${{ matrix.enabled && matrix.url != '' }}
        env:
          TARGET_URL: ${{ matrix.url }}
        run: |
