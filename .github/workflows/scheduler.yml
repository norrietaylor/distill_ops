            existing_job=$(jq -r '.job_id // "unknown"' /tmp/response.json 2>/dev/null || echo unknown)
            echo "::warning::Existing job in progress (409, job_id=${existing_job}) — skipping"
            exit 0
          elif [ "$http_code" -ge 400 ]; then
            echo "::error::${TARGET} webhook returned HTTP ${http_code}"
            echo "${TARGET}: failed (HTTP ${http_code})" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
          echo "${TARGET}: ok" >> "${GITHUB_STEP_SUMMARY}"

  maintenance:
    name: Weekly KB Maintenance (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
