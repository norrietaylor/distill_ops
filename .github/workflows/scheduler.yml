name: Distillery Scheduler

on:
  schedule:
    - cron: "23 * * * *"  # Hourly poll (at minute 23)
    - cron: "17 6 * * *"  # Daily rescore (06:17 UTC)
    - cron: "41 7 * * 1"  # Weekly maintenance (07:41 UTC Monday)
  workflow_dispatch:
    inputs:
      operation:
        description: "Operation to run"
        required: true
        default: "all"
        type: choice
        options:
          - poll
          - rescore
          - maintenance
          - all

# Each job follows the same pattern:
#   1. Install flyctl and force-start any suspended machines via the
#      Machines API (more reliable than waiting on the edge proxy's
#      auto_start_machines hook — see distillery#406).
#   2. Probe the public URL until the app answers 200.
#   3. POST the webhook with retries.
#
# Step 1 is the resilience fix for #406: the edge proxy's auto-wake
# can wedge for hours on a stuck machine, but `flyctl machine start`
# talks directly to the Machines API and recovers within seconds.

jobs:
  poll:
    name: Poll Feed Sources
    runs-on: ubuntu-latest
    # 30 (not 15): warm step can spend up to 600s and webhook POST up to
    # another 600s with retries — 15-min cap could kill a recovering run
    # before the webhook completes.
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.operation == 'poll' || github.event.inputs.operation == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '23 * * * *'
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master @ 2026-04-08, node24 runtime (post-v1.5, no newer tag)
      - name: Force-start any suspended Fly machines
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Talk directly to the Machines API instead of waiting on the
          # edge proxy's auto_start_machines (see distillery#406). Tolerate
          # "already started" — that's the happy path. Fail loudly only if
          # flyctl itself can't reach the API.
          # Run flyctl first and check its exit status BEFORE piping into
          # jq. If flyctl fails, an inline `flyctl | jq` substitution would
          # leave machine_ids empty and the `[ -z ]` branch below would
          # silently `exit 0`, masking the API outage. Capture stdout
          # separately so a non-zero flyctl status surfaces as a job error.
          if ! flyctl_json=$(flyctl machine list -a distillery-mcp -j); then
            echo "::error::flyctl machine list failed for distillery-mcp"
            exit 1
          fi
          machine_ids=$(printf '%s' "$flyctl_json" | jq -r '.[].id')
          if [ -z "$machine_ids" ]; then
            echo "::warning::No machines found for distillery-mcp"
            exit 0
          fi
          for id in $machine_ids; do
            echo "Starting machine ${id}..."
            flyctl machine start "$id" -a distillery-mcp || \
              echo "  (start returned non-zero — likely already running, continuing)"
          done
          # Brief settle so the proxy picks up the new state before we probe.
          sleep 5
      - name: Warm Fly machine
        env:
          DISTILLERY_URL: ${{ vars.DISTILLERY_URL }}
        run: |
          # Wake the suspended Fly machine with a cheap GET and wait until
          # the app is actually ready before issuing the webhook POST.
          # Bumped 300s -> 600s and added curl retries to ride out slower
          # cold starts and transient TLS handshake failures (#406).
          deadline=$((SECONDS + 600))
          attempt=0
          until [ "$SECONDS" -ge "$deadline" ]; do
            attempt=$((attempt + 1))
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              --connect-timeout 10 --max-time 30 \
              --retry 2 --retry-delay 5 --retry-all-errors \
              "${DISTILLERY_URL}/.well-known/oauth-authorization-server" || echo "000")
            if [ "$code" = "200" ]; then
              echo "App ready after ${attempt} attempt(s) (${SECONDS}s)"
              exit 0
            fi
            echo "Attempt ${attempt}: HTTP ${code} — waiting for app..."
            sleep 10
          done
          echo "::error::App did not become ready within 600s"
          exit 1
      - name: Trigger poll webhook
        env:
          DISTILLERY_WEBHOOK_SECRET: ${{ secrets.DISTILLERY_WEBHOOK_SECRET }}
          DISTILLERY_URL: ${{ vars.DISTILLERY_URL }}
        run: |
          http_code=$(curl -sS -o /tmp/response.json -w '%{http_code}' \
            --max-time 600 \
            --retry 3 --retry-delay 15 --retry-all-errors \
            -X POST \
            -H "Authorization: Bearer ${DISTILLERY_WEBHOOK_SECRET}" \
            "${DISTILLERY_URL}/api/poll")
          cat /tmp/response.json >> "${GITHUB_STEP_SUMMARY}"
          if [ "$http_code" = "429" ]; then
            echo "::warning::Endpoint in cooldown (429) — skipping"
            exit 0
          elif [ "$http_code" = "409" ]; then
            # In-flight job from a prior run that didn't finish before Fly
            # autosuspended the machine — the app intentionally returns 409
            # with {job_id, status_url} so a later cron can re-attach via
            # /jobs/{id} rather than racing. Treat as warning, not failure.
            # Upstream contract: src/distillery/mcp/webhooks.py.
            existing_job=$(jq -r '.job_id // "unknown"' /tmp/response.json 2>/dev/null || echo unknown)
            echo "::warning::Existing job in progress (409, job_id=${existing_job}) — skipping"
            exit 0
          elif [ "$http_code" -ge 400 ]; then
            echo "::error::Webhook returned HTTP ${http_code}"
            exit 1
          fi

  rescore:
    name: Rescore Feed Entries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.operation == 'rescore' || github.event.inputs.operation == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '17 6 * * *'
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master @ 2026-04-08, node24 runtime (post-v1.5, no newer tag)
      - name: Force-start any suspended Fly machines
