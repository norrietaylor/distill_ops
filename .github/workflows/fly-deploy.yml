name: Deploy to Fly.io

on:
  repository_dispatch:
    types: [container-published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # v1.5

      - name: Deploy to Fly.io
        run: |
          flyctl deploy \
            -c fly/fly.toml \
            --dockerfile fly/Dockerfile \
            --image "ghcr.io/norrietaylor/distillery:${{ github.event.client_payload.image_tag || github.event.inputs.image_tag || 'latest' }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
