name: Deploy to Fly.io

on:
  repository_dispatch:
    types: [container-published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master @ 2026-04-08, node24 runtime (post-v1.5, no newer tag)

      - name: Deploy to Fly.io
        run: |
          IMAGE_TAG="${{ github.event.client_payload.image_tag || github.event.inputs.image_tag || 'latest' }}"
          flyctl deploy \
            -c fly/fly.toml \
            --dockerfile fly/Dockerfile \
            --build-arg "IMAGE_TAG=${IMAGE_TAG}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
